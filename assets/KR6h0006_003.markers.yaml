  - {type: variant, offset: 3295, length: 40, content: '更無一知識，令脫於苦者。

      如信菩提道，親近修一相，

      謂離諸法想，不淨及無我。

      一切行相應，無實無性相，', 宋: 善友不相應，故無脫苦者，親近菩提道，淨信於一相，一切法離相，不淨無我相，一切行無實，亦無於性相, 元: 善友不相應，故無脫苦者，親近菩提道，淨信於一相，一切法離相，不淨無我相，一切行無實，亦無於性相, 明: 善友不相應，故無脫苦者，親近菩提道，淨信於一相，一切法離相，不淨無我相，一切行無實，亦無於性相, 宮: 善友不相應，故無脫苦者，親近菩提道，淨信於一相，一切法離相，不淨無我相，一切行無實，亦無於相相}
