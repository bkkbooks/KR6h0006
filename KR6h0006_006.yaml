body:
  text: 唐天竺三藏波羅頗蜜多羅譯陀羅尼品第六之一爾時於彼東方之分有世界名可樂佛名阿閦與無量無數菩薩摩訶薩俱諸佛境界種種加護神通力故於一剎那頃從彼發來到此釋迦如來阿羅訶三藐三佛陀中四天下所住之處時阿閦佛如自所化坐蓮華座彼諸菩薩摩訶薩亦如己功德神通之力化作蓮華微妙法座於蓮華臺向佛而坐如是東方無量無數微塵等佛剎衆首諸佛世尊住世將養於剎那頃一一如來與無量無數菩薩摩訶薩百千俱胝那由他聲聞大衆從彼發來到此釋迦如來阿羅訶三藐三佛陀於中四天下所住之處彼來大衆如己神通化作蓮華微妙法座於蓮華臺向佛而坐爾時於彼南方之分如來名寶星乃至廣說於蓮華臺向佛而坐爾時於彼西方之分有佛名阿彌陀乃至廣說於蓮華臺向佛而坐如是北方有佛名曰鼓音下方有佛名毗盧遮那乃至於彼蓮華臺上廣說如前上方如來名曰智光與無量無數百千俱胝那由他如恆河沙佛剎微塵等菩薩摩訶薩俱以諸佛境界種種加護於一剎那頃從彼發來到此佛剎中四天下釋迦如來阿羅訶三藐三佛陀所住之處時智光佛到已如自所化坐蓮華座彼諸菩薩摩訶薩等既到此已各各如己所量功德神通之力化作蓮華微妙法座於蓮華臺向佛而坐時彼十方諸來菩薩普集會者或有雨於閻浮檀金為供養事供養世尊乃至廣作如前所說或有右繞一切佛剎者或有渴仰合掌佛前如法聽者或有以己常所行善根之分思惟住者爾時須菩提童真恭敬合掌以己神通及佛神力加護持故於一切佛剎法聲遍滿說如是偈一切疑斷者牟尼月普來此昔未見聞衆成就悉現一切諸佛滿及淨戒菩薩佛剎如塔廟一切皆禮拜佛今非無因牟尼佛日來此土五濁惡衆生可穢污今當降伏魔黑暗黨破壞攝受諸善行為此今故來聽聞寂滅法魔衆悉摧散生起清淨意當得三佛陀行於大乘道汝應披忍鎧及為盡諸惑汝聽陀羅尼各坐蓮華座同聲請導師說此擁護法攝持一切法不退陀羅尼為正法久住一切障銷滅爾時無量無數得忍菩薩摩訶薩等咸共同聲作如是言唯願世尊坐蓮華座今大悲者為無上忍大慈所薰依無畏說攝持一切法除諸怖畏門過諸魔道摧倒魔幢建立法幢滅諸煩惱降一切怨斷一切疑入一切智解脫怖畏於諸護中為最上護能示菩薩一切法所謂若念若慧若道若持若不忘若巧方便乃至一切行安樂成就福德所依加護三摩提羼提陀羅尼入巧明智乃至持三十七助道法心為諸衆生光色怡悅故力名聞故樂獨住故樂說辨念令增長故聞持不忘故一切怨退故五穀成熟故持淨戒故念器成故行成就故到菩提故世尊今為我說此陀羅尼法正法隨攝久住故三寶種不斷故示現無上菩提道故真際如如虛空無差別故一切明暗相此彼分別無分別故衆生壽命養育我人無差別故不生不起不滅一切法平等相無體真際如如無差別故地水火風虛空識界無差別故諸佛世尊我今說此一切法性出生道場陀羅尼時無量無數百千俱胝那由他等衆生即聞法時無量衆生於三寶中得不壞信諸衆生等為善知識共相利益及無量無數衆生當發阿耨多羅三藐三菩提心得不退轉而得受記普請一切諸佛世尊說大法故彼諸佛等默受請已即時於彼蓮華臺上端身正坐即入如諸佛境界入平等願三昧入三昧已欲令一切諸佛剎內諸來會衆一切衆生一切諸苦皆悉銷滅一切善根皆得圓滿及得信淨念解成就諸佛世尊即見如是此佛剎內諸來衆生貪瞋癡等見慢醉高身見疑取有愛沈下等過諸心心數皆悉銷滅一一衆生皆如是解唯我一人於如來前正身聽法不為餘人唯我一人如來以一切思觀我一切心一切熱惱皆得銷滅更無餘人為聽法故請如來說爾時所有此佛剎內一切衆生普來會者諸根猛利合掌同聲白佛言世尊為我等說法大德善逝為我等說法我等當共隨順成就佛世尊法爾時釋迦如來以香莊嚴最上勝妙出過一切遍滿一切諸佛剎土為供養諸餘佛世尊故住諸佛前及一切諸佛剎內諸來大衆一切衆生復以種種寶種種華種種鬘種種香種種蓋種種幢種種幡種種莊嚴捧持滿掬現諸佛前以為供養爾時釋迦如來作如是言諸佛世尊一心念我所有現在十方世界各各世尊餘世界中普來問我我於往昔本願如是於種種穢惡五濁世界得阿耨多羅三藐三菩提是諸衆生失所依止失三乘道無明暗室煩惱暗翳不善法聚纏繞一切捨遠善法趣三惡道遠離一切聰慧之者作諸惡逆者謗毀正法者謗毀聖人者依無慈悲者我為慈愍此等衆生故發大悲力大精進力於彼寒熱疲勞諸苦我忍受之城邑國土道路宮室足步遊行為欲利益諸衆生故乏少麁澀少味飲食最可厭惡不喜之食為諸衆生殖善根故忍受種種麁澀苦觸舍那劫貝麁麻衣服以如是等糞掃之衣而取著之山谷林藪空舍冢間依此止住乃至受草舍那麁麻樹葉澀臭惡觸諸惡臥具以巧方便我著大悲精進之鎧為諸衆生說示種種為剎利王說自在法為婆羅門說四毗陀星論等法為諸大臣說於教導衆生等法為諸醫師說諸藥性所宜之法為諸商人說賣買法為諸農夫說田種法為諸女人說於嚴飾養育自在無他行法為諸沙門說忍辱柔和坐禪誦經勸營衆事為欲示誨成熟衆生未到者令到故未證者令證故未脫者令脫故忍受種種諸苦惱事成就衆生故遊於人間我今猶被此諸衆生因嫉妬故罵詈毀呰以淫欲法謗毀於我復以惡言誹謗於我道我詭言擊讚詐諂幻僞妄言麁獷共諸女人說愛欲語復以惡事加害於我塵土坌污刀毒火輪鐵捶箭矟鉞斧大石惡器仗等雨害於我狂象毒蛇師子虎狼水牛惡牛以大力士悉共打擲來害於我於我房舍止息之處及僧伽藍以不淨臭穢污滿其中我諸聲聞入城內時此非法衆生以非法歌舞勸請聲聞為非法事以無量百千方便欲害於我為欲隱蔽正法故欲滅法燈故欲破法船故欲散我法會故欲倒我法幢故爾時釋迦如來作如是言當觀過去諸佛法式如彼諸佛於此穢惡五濁惡世普大集會作妙法式為令妙法久住故於一切魔諸惡境界令摧碎故三寶種不斷故為諸衆生增長善根故一切外道所有言論以法摧伏故為諸衆生飢饉荒亂鬪訟疫病他方怨敵禁縛言訟不時寒不時熱不時風不時雨身口意業諸過惡見令銷滅故為令一切天龍夜叉人非人等正回向故一切家宅聚落城邑衢路諸處悉擁護故一切諂毒蠱道惛悶惡夢災相悉令壞故一切五穀藥草華果滋味令資養故剎利婆羅門毗舍首陀誨示善行故菩提心令滋茂故勤修諸波羅蜜故為令菩薩摩訶薩巧方便智念行勇猛樂說辨才得增長故受佛職位安慰入智度彼岸故如彼往昔如來阿羅訶三藐三佛陀說此金剛法等因緣法心建立摧碎陀羅尼印句入差別記法門演說受持互相隨喜善哉善哉如是如是於今現在所有十方諸佛世尊住世將養者悉來到此娑婆佛剎五濁惡世來問訊我各在華座彼諸佛等擁護此佛剎內諸衆生故應說此金剛法等因緣法心建立摧碎陀羅尼印句入差別記法門演說受持互相隨喜令妙法久住故一切諸魔惡境界力令磨滅故如前廣說乃至無障礙智度彼岸故慈愍攝受及受我請故為令此佛剎內說妙法門得久住故一切外道不能過故得不壞法及三寶種不斷絶故一切衆生得受法味故爾時一切諸佛世尊咸如是言如是如是我等決定作如是事於此佛剎護持妙法令久住故一切諸魔惡境界力令摧碎故乃至無障礙智度彼岸故我等當說此金剛法等因緣法心建立摧碎陀羅尼印句差別門記大持法門汝等大衆今當諦聽一切諸佛大集此剎說如是呪多地也他鴦伽邏鴦伽邏一崩伽邏二鉢囉朋迦邏三婆耶弭呵弭哆藍婆斯四阿溪阿佉門跋利度迷五徒曼帝六雞跋嚌雞榆利七三摩婆呵泥去音八三曼多跋達利九達迷達迷十馱摩雞十一暗破隸十二弭哆囉丑破隸十三破囉婆帝十四伽尼膩宜反十五伽拏婆藍帝十六哂利底利十七哂囉呬囉雞十八闍婆帝闍婆帝十九吒迦斯二十吒建帝二十一吒迦婆藍二十二迦拏婆漠帝二十三哂藺帝二十四始藺帝二十五嬪頭婆帝二十六衢婆去音醯二十七受離二十八弭多囉受離二十九受履三十阿伽離三十一阿婆迷三十二娑寫多他當三十三呼盧哂離三十四栴涕隸三十五三摩達迷三十六馱迷三十七俱朱盧三十八謨朱盧三十九阿質吒四十至離四十一至離四十二遮婆呵四十三朱盧朱盧四十四弭多囉婆呵四十五俱盧俱盧四十六娑囉娑囉四十七俱㧣俱㧣四十八摩呵薩囉四十九都㧣都㧣五十磨呵薩底耶離馱耶晡澀箄五十一蘇晡澀箄五十二度磨鉢離呵隸五十三阿婆曳五十四盧至泥五十五迦樂差五十六阿婆耶磨薩都毗婆呵底隸五十七磨隸磨隸五十八鉢濕縛呿五十九尸尸囉六十盧迦毗那耶迦六十一跋時隸六十二跋時跋時囉達離六十三跋時囉婆帝六十四跋時囉馱提六十五斫乞囉跋時隸六十六斫乞隸六十七遮婆泥六十八達隸達隸六十九婆隸婆隸七十布隸七十一吒隸七十二呼呼隸七十三傍伽嬪婆隸七十四舍鄰舍七十五至離七十六朱離七十七慕隸七十八漫茶隸七十九漫茶泥八十伽伽離八十一慕茶泥八十二薩波謨茶泥八十三地地囉耶泥八十四磨醯濕縛囉八十五羅耶泥八十六離莘闍泥八十七馱婆婆至八十八栴茶羅栖迷八十九薩婆薩寫阿地瑟魑去音多九十叱電都婆呵那磨弭泥九十一波羅囉底九十二烏闍惡伽隸九十三毗至泥九十四婆遮那囉呵九十五蒱隸蒱隸九十六瞿盧瞿盧九十七慕盧慕盧九十八哂離哂離九十九呵囉呵囉一百迦建茶婆呵百一哂哂當百二阿喻那建茶時縛羅婆栖百三揭馱泥百四阿陀阿泥百五末伽阿毗盧呵泥百六破羅薩底曳百七阿盧呵婆底百八哂離哂離百九耶陀婆闍耶薩縛惡伽囉百十耶陀波蘭者離馱耶婆呵百十一薩底耶鉢離婆婆百十二末伽避盧呵泥百十三阿遮羅勃提百十四馱馱鉢囉遮囉百十五波遮耶百十六賓茶離馱耶百十七栴達囉遮囉拏百十八阿遮隸百十九輸達泥百二十鉢囉乞離底耶末伽百二十一伊羅伽離梨百二十二鉢囉弊百二十三娑囉勃囉帝百二十四薩婆哆囉哆他多百二十五薩底耶阿奴伽帝百二十六阿那婆囉那勃囉帝百二十七阿羅多百二十八鴦瞿隸百二十九奢彌泥百三十毗勃囉磨婆喻哂百三十一阿哂多阿婆囉百三十二尼囉婆耶婆百三十三阿質囉末伽百三十四羅那羅瞿薩隸百三十五底離囉多那傍世百三十六達磨迦時縛羅達隸百三十七三沒達囉婆底百三十八磨呵馱步多毗耶百三十九三沒達囉鞞伽婆底陀羅尼沒達隸拏百四十磨佡沒達囉蘇囉鉢囉底三毗陀沒達囉百四十一阿跋多尼百四十二三跋多尼百四十三三慕賀塞迦囉百四十四毗地喻多囉栖那廁底沒達離都呬百四十五曳雞質畢利地毗婆呵百四十六婆婆婆呵呵呵百四十七雞吒迦婆吒百四十八世羅鉢囉底底離多曳那沒達離多百四十九陀囉尼百五十馱囉馱囉馱囉百五十一檀地羅檀地羅呼色百五十二迦薩婆離馱耶沒達離都呬百五十三闍茶闍跋吒百五十四闍呿娑吒百五十五蘇末底末底百五十六磨呵馱步多沒達離多百五十七曳雞質殺阿耶單那尼失離多步多百五十八伽尼弭尼百五十九薩遮尼百六十瞿沙薩遮尼百六十一沒達離多百六十二遮離耶阿地瑟侘那百六十三婆迦鉢他百六十四那阿溺他百六十五磨呵布尼百六十六沒遮