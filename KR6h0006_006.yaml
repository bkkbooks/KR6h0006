起慈悲攝受於我施我歡喜莫令我今以此麁言得惡果報爾時懷樂菩薩白無量壽佛言世尊若此釋天不悔此語時得何果報時無量壽佛告懷樂菩薩言善男子今此釋天若不悔過於未來世八萬四千生中作草驢身為他輕賤是故善男子等常須慎意護此口業爾時佛告世自在梵天言善男子隨汝樂說我已擁護汝所說也世自在梵天既蒙護念歡喜合掌遍觀十方作如是言唯願世尊一心念我若佛菩薩及聲聞衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽欲令正法久住世者願於此處同與我欲若法師及聽衆欲得隨順相應無惱亂者當與我欲若彼惡魔人非人等未來之世於說法者及衆生類作惱亂時我當遮障與彼要誓斷其惡心自在梵天作是語時所出音聲遍滿一切諸佛世界爾時一切諸梵天王一時同聲作如是言我等亦以此陀羅尼同共與欲所以者何我等於後亦當受持此陀羅尼亦當擁護未來之世善男子等有能開示演說如是法門及聽法衆我當令彼隨順相應得如所願我等今於佛世尊菩薩摩訶薩及大聲聞衆前與此陀羅尼欲時彼自在梵天作如是言唯願世尊及菩薩聲聞大弟子衆擁護於我即說呪曰多地也他一阿摩離二毗摩離三伽拏山地四呵離五氈地六摩呵氈地七遮彌八摩呵遮彌九蘇彌十薩他彌十一阿婆呵十二毗婆呵十三鴦伽闍十四泥哆囉佉毗十五茂羅波履侈啼十六藥叉氈馳十七毗舍遮氈馳十八阿跋哆泥十九三跋哆泥二十僧塞迦囉泥二十一讇波泥二十二摸呵泥二十三嘔遮吒泥二十四呵摩呵二十五呵摩呵呵摩呵二十六阿軍遮泥二十七佉伽舍婆二十八阿摩羅二十九阿茂羅三十茂羅波履跋坻三十一阿婆羅佉婆三十二娑婆呵三十三世尊若有男子女人違逆不行聖衆大集所說神呪者眼睛墮落頭頂破裂支節分散復說呪曰多地也他阿者者一阿婆呵者者二帚迦囉叉三遮遮吒四佉遮遮五那佉伽遮遮六遮遮遮遮七那遮呵茂羅遮遮八遮茂羅九遮遮呵摩茂羅遮遮十呵牟呵牟十一婆茶婆呵十二娑婆呵十三爾時一切梵王乃至毗舍遮王聞是說已皆唱善哉作如是言假使鬼神有大威力雄猛迅疾所向摧碎力能過千我今以此陀羅尼章句悉令羂著如是一切諸惡鬼神能與衆生作不利者皆使潛滅無逃活處自在梵天復作是言若有住惡無慈愍心不知恩德惱衆生者若鬼若魔及其眷屬常來伺求受灌頂職剎利王等或伺求妃后王子王女及綵女等乃至宰相官屬并餘民庶於佛法中得清淨信者若男若女童男童女優婆塞優婆夷樂聽法者比丘比丘尼禪誦精進不放逸者如是鬼魔人非人等求其長短我當擁護乃至能令一剎那頃惡心不起況復於彼一毛惱亂若起惡心惱亂破壞奪其精氣以毒噓身如是伺求覔其過者以此陀羅尼威神力故若魔眷屬人非人等頭破作七分眼精殞墜心水乾枯得白癩病其身臭爛失本神通陷沒於地復為惡風所吹擲置四方無人之處塵土坌身狂迷心亂周慞馳走所行之地地皆破裂隨墮其中深八萬四千由旬於彼命終若是魔等違背此呪水行之類於佛聖教得清淨信者勤營僧事比丘比丘尼等彼諸鬼神作惱亂者亦得如上所說惡報頭破七分及以命終若是不退魔場陀羅尼隨所在處我等當勤加護所有一切樂法衆生我當勤心晝夜守護及彼一切惡毒夜叉富單那等我當驅逐出其境界若陀羅尼所在之處一切國土鬪諍飢饉他方怨敵非時風雨寒熱疫病我當除斷令無有餘亦令其國一切人民善根成就隨順和合安隱豐饒能令法師及聽法者名聞高遠無有病苦亦為勸勵四輩檀越利養供給多地也他鴦伽邏鴦伽邏一崩伽邏二鉢囉朋迦囉三婆耶弭呵弭哆藍婆斯四阿溪阿呿門跋利五度迷徒曼帝六雞跋知雞榆利七三摩婆呵泥去音八三曼多跋達利九達迷達迷十馱摩雞十一闍破雞十二弭多囉紐破隸十三破羅婆帝十四伽尼膩宜切十五伽拏婆藍帝十六哂利底利十七哂囉哂囉雞十八閻時瞻切婆帝婆帝十九吒迦斯吒建帝二十吒迦婆藍帝二十一伽拏婆漢帝二十二哂藺帝二十三始藺帝二十四嬪頭婆帝二十五衢婆去聲醯二十六受離弭多囉受離二十七受屣阿伽離二十八阿婆迷二十九娑寫多他當三十呼盧哂離三十一旃涕隸三摩達迷三十二馱迷三十三俱朱盧三十四謨朱盧三十五阿質吒至離三十六至遮婆呵三十七朱盧朱盧三十八弭多囉婆呵三十九俱盧俱盧四十娑囉娑囉四十一俱株俱株四十二磨呵薩囉四十三都株都株四十四磨呵薩底耶四十五奚離馱耶補數箄四十六蘇補數箄四十七度磨鉢離呵隸四十八阿婆移盧至泥四十九迦樂差脾五十阿婆耶磨薩堵毗婆呵五十一底底隸五十二磨磨隸五十三鉢濕縛呿五十四尸尸囉五十五盧迦毗那耶迦五十六跋時隸跋時囉達隸五十七跋時囉婆帝五十八跋時囉馱提五十九斫迦囉跋時提六十斫迦囉跋時隸六十一斫迦隸遮婆泥六十二達隸達隸六十三婆隸婆隸六十四布隸六十五吒隸六十六呼呼隸六十七傍伽嬪婆隸六十八舍利舍利六十九至離朱離七十慕隸七十一曼荼隸七十二曼荼泥七十三伽伽囉尼七十四慕荼泥七十五薩波謨荼泥七十六地地囉耶泥七十七磨醯濕縛囉羅耶泥七十八奚離莘闍泥七十九馱婆婆至八十旃荼羅栖迷八十一薩婆薩寫阿地瑟恥去聲多八十二叱電堵婆呵那八十三磨弭泥八十四破羅囉底八十五烏闍伽隸八十六毗至泥八十七婆那囉呵八十八蒲蒲隸八十九瞿盧瞿盧九十慕盧慕盧九十一哂離哂離九十二呵囉呵囉九十三迦建荼婆呵九十四哂哂哆九十五阿喻那建荼九十六時縛囉婆栖九十七揭馱泥九十八阿陀呵泥九十九末伽毗盧呵泥一百破羅薩底一百一阿盧沙婆底一百