body:
  text: 寶星經序唐釋法琳撰寶星經梵本三千餘偈如來初證覺道度目連身子及降伏魔王護持國土説此經也自象化東漸綿歷歲時三輪八藏之文四樹五乘之旨顯神光於石室流梵響於清臺雖鞮譯相尋尚多疑闕我大唐皇帝乃聖乃神允文允武乘機撫運拯溺救焚反上皇之風行不言之信去泰去甚既掩頓於八絃無事無為乃朝宗於萬國瀚海天山之地盡入提封龍庭鳳穴之卿咸霑聲教仁踰解網治踵結繩大德間間外齊八則小心翼翼內整四儀臨赤縣而溢慈悲寄玄扈而敷弘誓每以諸有非樂物我俱空眷言貞要無過釋典有中天竺國三藏法師波頗唐言光智誓傳法化不憚艱危遠涉蔥河來遊真丹以貞觀元年景戍洎于京輦既登上席爰懋錦衣有詔所司搜揚碩德兼間三教備舉十科者一十九人於大興善寺請波頗三藏相對翻譯沙門慧乘等證義沙門玄謨等譯語沙門慧明法琳等執筆承旨殷勤詳覆審名定義具意成文起貞觀三年三月訖四年四月凡十卷十三品用紙一百三十幅總六萬三千八百八十二言歸命一切佛菩薩
